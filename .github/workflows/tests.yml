# Bridge + formatter tests. Zero npm dependencies (node builtins only), so no
# install step. The Rust MockChain regression stays local (./stitch.sh --mock)
# — compiling the Miden workspace on CI isn't worth the minutes yet.
name: tests
on: [push, pull_request]
jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node --test test/
        working-directory: ux-prototype
